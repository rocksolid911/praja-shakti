name: Deploy Backend to AWS ECS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 101248948257.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: prajashakti-backend
  ECS_CLUSTER: prajashakti-cluster

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            --push \
            ./backend

      - name: Force new ECS deployment (web)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service prajashakti-web \
            --force-new-deployment

      - name: Force new ECS deployment (worker)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service prajashakti-worker \
            --force-new-deployment

      - name: Force new ECS deployment (beat)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service prajashakti-beat \
            --force-new-deployment

      - name: Wait for web service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services prajashakti-web
