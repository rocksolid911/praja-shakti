name: prajashakti
description: PrajaShakti AI - Community Intelligence Platform for Rural India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Navigation
  go_router: ^13.0.0
  # Maps
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.5.0
  # Auth & Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # Networking
  dio: ^5.4.0
  # Voice recording
  record: ^6.2.0
  just_audio: ^0.9.36
  permission_handler: ^11.1.0
  # Location
  geolocator: ^11.0.0
  # Photos
  image_picker: ^1.0.7
  # UI
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  # Utils
  intl: ^0.20.2
  json_annotation: ^4.8.1
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/praja_shakti_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/praja_shakti_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/praja_shakti_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#1A237E"
  windows:
    generate: true
    image_path: "assets/icon/praja_shakti_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icon/
